<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Matrix Screensaver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            cursor: none; /* прячем курсор */
            font-family: monospace;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        const chars = 'ԱԲԳԴԵԶԷԸԹԺԻԼԽԾԿՀՁՂՃՄՅՆՇՈՉՊՋՌՍՎՏՐՑՒՓՔՕՖ0123456789';
        const charArray = chars.split('');
        const fontSize = 19;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = Array(columns).fill(1);
        let lastChars = Array(columns).fill(null);

        function draw() {
            // Fade the previous frame
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                
                // Turn the previous latest character green
                if (lastChars[i]) {
                    ctx.fillStyle = '#0F0';
                    ctx.fillText(lastChars[i].char, i * fontSize, lastChars[i].y);
                }
                
                // Draw the new latest character in yellow
                ctx.fillStyle = '#FF0';
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                // Store current character as the last one for next frame
                lastChars[i] = { char: text, y: drops[i] * fontSize };
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                    lastChars[i] = null;
                }
                drops[i]++;
            }
        }

        function draw_simple() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        let currentDrawFunc = draw;
        let drawInterval = setInterval(() => currentDrawFunc(), 70);
        
        // Switch between draw and draw_simple every 5 seconds
        setInterval(() => {
            currentDrawFunc = (currentDrawFunc === draw) ? draw_simple : draw;
            lastChars = Array(columns).fill(null); // Reset last chars when switching
        }, 5000);

   
    </script>
</body>
</html>
